server:
  port: 8080

spring:
  application:
    name: tezza-lending
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:h2-file}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${GMAIL_USERNAME:}
    password: ${GMAIL_APP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
          starttls:
            enable: true
            required: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

lending:
  logging:
    source-system: TEZZA-LENDING-API
    target-system: LENDING-CORE
  sweep:
    overdue-cron: "0 0/10 * * * *"
  notifications:
    email:
      enabled: ${GMAIL_NOTIFICATIONS_ENABLED:true}
      from: ${GMAIL_FROM:${GMAIL_USERNAME:}}

---
spring:
  config:
    activate:
      on-profile: h2-file
  datasource:
    url: jdbc:h2:file:${H2_FILE_PATH:./data/lending-db};MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: ${H2_USERNAME:sa}
    password: ${H2_PASSWORD:}
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
      path: /h2-console

---
spring:
  config:
    activate:
      on-profile: h2-memory
  datasource:
    url: jdbc:h2:mem:${H2_DATABASE_NAME:lending-db};MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: ${H2_USERNAME:sa}
    password: ${H2_PASSWORD:}
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
      path: /h2-console

---
spring:
  config:
    activate:
      on-profile: postgres
  datasource:
    url: ${POSTGRES_JDBC_URL:jdbc:postgresql://localhost:5432/tezza_lending}
    username: ${POSTGRES_USERNAME:postgres}
    password: ${POSTGRES_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  h2:
    console:
      enabled: false
